<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="form-card">
    <div class="form-header">
        <h2 id="complaint-form-title" class="form-title"></h2>
        <button onclick="showCategories()" class="btn-back">Back to Categories</button>
    </div>
    
    <form id="active-complaint-form" onsubmit="window.submitComplaint(event, this.dataset.category)" class="form-grid" data-category="">
        
        <div class="form-group">
            <label for="title" class="form-group-label">Title:</label>
            <input type="text" id="title" name="title" required class="form-input">
        </div>
        
        <div class="form-group">
            <label for="description" class="form-group-label">Description:</label>
            <textarea id="description" name="description" required rows="5" class="form-textarea"></textarea>
        </div>
        
        <div class="form-group">
            <label for="file" class="form-group-label">Attachment (optional):</label>
            <input type="file" id="file" name="file" class="form-file-input">
        </div>
        
        <button type="submit" class="btn-submit">Submit Complaint</button>
    </form>
</div>
</body>
</html>
